# ---------------------------------------------------------------------------
# Pinned outbound egress for the explorer's app user.
#
# The analysis agent runs untrusted code. Even with the systemd sandbox, that
# code can open sockets. This ruleset lets the app user reach ONLY the Anthropic
# API and DNS, and drops everything else outbound — so a compromise cannot
# download a miner, phone home, scan the internet, or exfiltrate data.
#
# It matches by the app user's UID (`meta skuid`), so it does NOT affect any
# other service on the box. `deploy.sh` substitutes __APP_UID__ and merges these
# rules into the running ruleset; persist with `nft list ruleset > /etc/...`.
#
# Anthropic API ranges (verify current values at https://docs.anthropic.com/):
#   IPv4  160.79.104.0/23
#   IPv6  2607:6bc0::/32
# ---------------------------------------------------------------------------

table inet explorer_egress {
    chain output {
        type filter hook output priority filter; policy accept;

        # only constrain the app user
        meta skuid != __APP_UID__ accept

        # allow the app user's established/return traffic and loopback
        meta skuid __APP_UID__ ct state established,related accept
        meta skuid __APP_UID__ oif "lo" accept

        # allow DNS
        meta skuid __APP_UID__ udp dport 53 accept
        meta skuid __APP_UID__ tcp dport 53 accept

        # allow HTTPS to the Anthropic API only
        meta skuid __APP_UID__ ip  daddr 160.79.104.0/23 tcp dport 443 accept
        meta skuid __APP_UID__ ip6 daddr 2607:6bc0::/32   tcp dport 443 accept

        # drop everything else from the app user
        meta skuid __APP_UID__ counter drop
    }
}
